<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="魔法漢字拼圖 - 快樂學漢字，拼出大智慧！適合兒童的線上多語言漢字拼圖與生字練習遊戲。">
    <meta name="keywords" content="漢字, 拼圖, 兒童教育, 中文學習, 華語教學, 生字練習, 學習遊戲">
    <meta property="og:title" content="魔法漢字拼圖">
    <meta property="og:description" content="動動小手，把生字拼回來！包含發音朗讀與生字卡列印功能。">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#f0f9ff">
    <title>魔法漢字拼圖</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@600&family=Nunito:wght@700&display=swap');

        :root {
            --wood-color: #e6c89c;
            --wood-border: #c19a6b;
            --felt-color: #3e6e45;
        }

        body {
            font-family: "Nunito", "Noto Serif TC", sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #cbebff 100%);
        }

        .font-kai {
            font-family: "KaiTi", "BiauKai", "DFKai-SB", "TW-Kai", "Ma Shan Zheng", serif;
        }

        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- 難易度視覺控制 --- */
        body.diff-hard .grid-hint-text,
        body.diff-master .grid-hint-text {
            opacity: 0;
        }
        /* 過關後顯示提示字作為獎勵 */
        body.diff-hard .completed-grid .grid-hint-text,
        body.diff-master .completed-grid .grid-hint-text {
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        body.diff-master .tian-grid::before,
        body.diff-master .tian-grid::after {
            opacity: 0;
        }

        /* --- 拼圖碎片樣式 --- */
        .puzzle-piece {
            width: 100px;
            height: 100px;
            overflow: hidden;
            position: relative;
            background-color: #fffbf0;
            cursor: grab;
            touch-action: none;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.2);
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.15s;
            border-radius: 6px;
            z-index: 20;
            border: 1px solid #e5d5b0;
        }

        .puzzle-piece:active {
            cursor: grabbing;
            transform: scale(1.1) rotate(2deg);
            box-shadow: 5px 8px 15px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .puzzle-piece.selected {
            border: 3px solid #f87171;
            transform: scale(1.1);
            box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.3);
            z-index: 100;
        }

        /* 碎片文字 */
        .puzzle-text {
            position: absolute;
            font-size: 180px;
            line-height: 200px;
            width: 200px;
            height: 200px;
            color: #2d3748;
            pointer-events: none;
            text-align: center;
            font-weight: bold;
        }

        .pos-0 .puzzle-text { top: 0; left: 0; }
        .pos-1 .puzzle-text { top: 0; left: -100px; }
        .pos-2 .puzzle-text { top: -100px; left: 0; }
        .pos-3 .puzzle-text { top: -100px; left: -100px; }

        /* --- 田字格樣式 --- */
        .tian-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 0; 
            background-color: #fff;
            border: 3px solid #e11d48;
            width: 206px;
            height: 206px;
            position: relative;
            box-shadow: 0 6px 12px -2px rgba(0, 0, 0, 0.15);
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .grid-hint-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 180px; 
            color: #e2e8f0; 
            pointer-events: none;
            font-weight: bold;
            z-index: 5;
        }

        .tian-grid::before {
            content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1px;
            border-top: 2px dashed #fda4af; pointer-events: none; z-index: 1;
        }
        .tian-grid::after {
            content: ''; position: absolute; left: 50%; top: 0; height: 100%; width: 1px;
            border-left: 2px dashed #fda4af; pointer-events: none; z-index: 1;
        }

        .drop-zone {
            width: 100px;
            height: 100px;
            background-color: transparent; 
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s;
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        .drop-zone.highlight {
            background-color: rgba(186, 230, 253, 0.4);
            box-shadow: inset 0 0 0 2px #3b82f6;
        }

        .drop-zone.error-zone {
            background-color: rgba(254, 202, 202, 0.4);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px); }
            40%, 80% { transform: translateX(4px); }
        }

        @keyframes success-pop {
            0% { transform: scale(1); border-color: #e11d48; }
            50% { transform: scale(1.05); border-color: #22c55e; box-shadow: 0 0 25px rgba(34, 197, 94, 0.5); }
            100% { transform: scale(1); border-color: #22c55e; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        }
        .completed-grid {
            animation: success-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            border-color: #22c55e !important;
            z-index: 25;
        }
        .completed-grid::before, .completed-grid::after { opacity: 0; }

        /* --- 背景拼圖動畫 --- */
        @keyframes float-bg {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(25px, -35px) rotate(15deg); }
            66% { transform: translate(-25px, 25px) rotate(-15deg); }
        }
        .bg-puzzle {
            animation: float-bg 25s infinite ease-in-out;
        }

        /* --- 資訊卡 --- */
        .char-info-card {
            margin-top: 12px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            width: 206px;
            border: 1px solid #e2e8f0;
            opacity: 0;
            transform: translateY(-15px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        .char-info-card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        /* --- 托盤 --- */
        .tray-container {
            background-color: #f7fafc;
            background-image: 
                linear-gradient(45deg, #f1f5f9 25%, transparent 25%), 
                linear-gradient(-45deg, #f1f5f9 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #f1f5f9 75%), 
                linear-gradient(-45deg, transparent 75%, #f1f5f9 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border: 8px solid #cbd5e1;
            border-radius: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05), 0 10px 20px rgba(0,0,0,0.1);
        }

        /* 通用視窗樣式 (Toast, Modal) */
        #toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background-color: rgba(31, 41, 55, 0.9); color: white;
            padding: 12px 24px; border-radius: 50px; font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none; z-index: 100;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* 歡迎畫面 */
        #startScreen {
            transition: opacity 0.5s ease-out;
        }
        #startScreen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* 彈出視窗 */
        #editNameModal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #editNameModal.show {
            opacity: 1; pointer-events: auto;
        }

        /* RWD 調整 */
        @media (max-width: 600px) {
            .puzzle-piece, .drop-zone { width: 75px; height: 75px; }
            .tian-grid { width: 156px; height: 156px; border-width: 3px; }
            .puzzle-text { font-size: 135px; line-height: 150px; width: 150px; height: 150px; }
            .grid-hint-text { font-size: 135px; } 
            .char-info-card { width: 156px; padding: 8px; }
            
            .pos-1 .puzzle-text { left: -75px; }
            .pos-2 .puzzle-text { top: -75px; }
            .pos-3 .puzzle-text { top: -75px; left: -75px; }
            
            .tray-container { padding: 1rem !important; border-width: 4px; }
        }

        /* --- 列印專用樣式 --- */
        @media print {
            @page { margin: 0.5cm; size: portrait; }
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; margin: 0; padding: 0; }
            #startScreen, header, .controls-container, .game-container, footer, #toast, #successMessage, #editNameModal, #customPuzzleModal, #topRightPanel, #bg-puzzles { display: none !important; }
            #printable-cards { display: block !important; padding: 0; width: 100%; }
            
            #print-header {
                text-align: center; margin-bottom: 15px; font-size: 24px; font-weight: bold;
                border-bottom: 2px solid #ccc; padding-bottom: 10px; width: 100%;
            }

            .cards-wrapper {
                display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; justify-items: center;
            }

            .print-card {
                border: 2px solid #333; border-radius: 12px; width: 100%; padding: 10px;
                page-break-inside: avoid; text-align: center; box-shadow: none; margin-bottom: 10px;
            }

            .print-char {
                font-family: "KaiTi", "BiauKai", serif; font-size: 130px; line-height: 1.1;
                border: 1px dashed #ccc; margin: 5px auto; width: 150px; height: 150px;
                display: flex; align-items: center; justify-content: center;
            }
            
            .print-py { font-size: 20px; font-weight: bold; margin-bottom: 2px; }
            .print-zh { font-size: 20px; font-weight: bold; color: #e11d48; margin-bottom: 2px; }
            .print-meta { font-size: 14px; margin: 5px 0; color: #555; }
            .print-en { font-size: 16px; font-weight: bold; color: #2563eb; margin-bottom: 2px; }
            .print-words { font-size: 14px; }
            .print-poly { font-size: 14px; color: #666; margin-top: 2px; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 no-select text-gray-700 diff-normal">

    <!-- 浮動背景拼圖 (修正圖層與透明度) -->
    <div id="bg-puzzles" class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <i class="fas fa-puzzle-piece absolute text-[12rem] text-blue-400 opacity-10 top-[5%] left-[5%] bg-puzzle" style="animation-delay: 0s;"></i>
        <i class="fas fa-puzzle-piece absolute text-[16rem] text-indigo-400 opacity-10 top-[30%] left-[80%] bg-puzzle" style="animation-delay: -5s; animation-duration: 25s;"></i>
        <i class="fas fa-puzzle-piece absolute text-[10rem] text-cyan-500 opacity-10 top-[70%] left-[10%] bg-puzzle" style="animation-delay: -2s; animation-duration: 18s;"></i>
        <i class="fas fa-puzzle-piece absolute text-[14rem] text-blue-500 opacity-10 top-[15%] left-[55%] bg-puzzle" style="animation-delay: -10s; animation-duration: 22s;"></i>
        <i class="fas fa-puzzle-piece absolute text-[20rem] text-sky-400 opacity-10 top-[65%] left-[65%] bg-puzzle" style="animation-delay: -7s; animation-duration: 28s;"></i>
        <i class="fas fa-puzzle-piece absolute text-[11rem] text-indigo-300 opacity-10 top-[45%] left-[25%] bg-puzzle" style="animation-delay: -12s; animation-duration: 15s;"></i>
    </div>

    <!-- 右上方浮動面板 (語言切換) -->
    <div id="topRightPanel" class="absolute top-4 right-4 z-50 flex flex-col gap-2 items-end">
        <select id="langSwitcher" onchange="changeLanguage()" class="bg-white/80 backdrop-blur-sm border border-blue-200 rounded-lg px-3 py-1 text-sm font-bold text-gray-600 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
            <option value="zh-TW">繁體中文</option>
            <option value="zh-CN">简体中文</option>
            <option value="en">English</option>
        </select>
    </div>

    <!-- 歡迎/輸入姓名畫面 -->
    <div id="startScreen" class="fixed inset-0 bg-gradient-to-br from-blue-100 to-indigo-200 z-[9999] flex flex-col items-center justify-center p-4">
        <div class="bg-white p-8 md:p-12 rounded-3xl shadow-2xl text-center max-w-lg w-full border-4 border-white/50 backdrop-blur-sm animate-[fadeIn_0.5s_ease-out]">
            <h1 class="text-5xl font-extrabold text-blue-600 mb-2 tracking-wide drop-shadow-sm font-kai">
                <i class="fas fa-magic text-yellow-400 mr-2"></i><span data-i18n="title">魔法漢字拼圖</span>
            </h1>
            <p class="text-slate-500 text-lg mb-8 font-medium" data-i18n="subtitle">快樂學漢字，拼出大智慧！</p>
            
            <div class="mb-8">
                <label for="playerNameInput" class="block text-gray-700 font-bold mb-3 text-xl">
                    <i class="fas fa-user-edit mr-2 text-blue-400"></i><span data-i18n="askName">請問你的名字是？</span>
                </label>
                <input type="text" id="playerNameInput" data-i18n-ph="inputName" placeholder="請輸入名字" maxlength="10"
                       class="w-full px-6 py-4 rounded-2xl border-4 border-blue-100 bg-blue-50 focus:bg-white focus:outline-none focus:border-blue-400 text-2xl text-center font-bold text-gray-700 placeholder-blue-200 transition-all shadow-inner">
            </div>
            
            <button onclick="startGame()" class="w-full bg-gradient-to-r from-yellow-400 to-orange-400 hover:from-yellow-500 hover:to-orange-500 text-white text-2xl font-bold py-4 rounded-2xl shadow-lg shadow-orange-200 transform transition-all active:scale-95 flex items-center justify-center gap-3">
                <span data-i18n="startBtn">開始挑戰</span> <i class="fas fa-rocket"></i>
            </button>
        </div>
        <div class="mt-8 text-blue-800/60 font-medium" data-i18n="footer">Powered by Gemini | Sophia老師的AI練習本</div>
    </div>

    <!-- 修改名字彈出視窗 (Modal) -->
    <div id="editNameModal">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-sm border border-slate-200 transform scale-95 transition-transform" id="modalContent">
            <h3 class="text-xl font-bold text-slate-700 mb-4"><i class="fas fa-user-edit text-blue-500 mr-2"></i><span data-i18n="editName">修改名字</span></h3>
            <input type="text" id="editNameInput" data-i18n-ph="inputNewName" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 mb-4" placeholder="輸入新名字">
            <div class="flex justify-end gap-2">
                <button onclick="closeEditModal()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition" data-i18n="cancel">取消</button>
                <button onclick="confirmEditName()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition" data-i18n="confirm">確定修改</button>
            </div>
        </div>
    </div>

    <!-- 編輯自訂題目彈出視窗 (Modal) -->
    <div id="customPuzzleModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[9999] opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-md border border-slate-200 transform scale-95 transition-transform" id="customPuzzleModalContent">
            <h3 class="text-xl font-bold text-slate-700 mb-4"><i class="fas fa-pen-to-square text-emerald-500 mr-2"></i><span data-i18n="editPuzzle">編輯自訂題目</span></h3>
            <p class="text-sm text-slate-500 mb-2" data-i18n="customPuzzlePrompt">請輸入你想練習的漢字：</p>
            <textarea id="customPuzzleInput" rows="3" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-400 mb-4 font-kai text-2xl resize-none text-center" placeholder="例如：春暖花開"></textarea>
            <div class="flex justify-end gap-2">
                <button onclick="closeCustomPuzzleModal()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition" data-i18n="cancel">取消</button>
                <button onclick="saveCustomPuzzle()" class="px-4 py-2 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition shadow-md shadow-emerald-500/30" data-i18n="save">儲存並開始</button>
            </div>
        </div>
    </div>

    <!-- 標題區 -->
    <header class="text-center mb-6 px-4 pt-4">
        <h1 class="text-3xl md:text-4xl font-extrabold text-blue-600 mb-2 tracking-wider drop-shadow-sm">
            <i class="fas fa-puzzle-piece mr-2 text-yellow-400"></i><span data-i18n="title">魔法漢字拼圖</span>
        </h1>
        <p class="text-slate-500 font-medium" data-i18n="subtitle">動動小手，把生字拼回來！</p>
    </header>

    <!-- 主控制面板 -->
    <div class="controls-container bg-white p-5 rounded-2xl shadow-xl w-full max-w-5xl mx-4 mb-8 border border-slate-100 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-50 rounded-full opacity-50 pointer-events-none"></div>
        <div class="absolute -bottom-10 -left-10 w-24 h-24 bg-yellow-50 rounded-full opacity-50 pointer-events-none"></div>

        <div class="flex flex-col xl:flex-row justify-between items-center gap-4 md:gap-6 relative z-10 w-full">
            <!-- 左側：設定區 -->
            <div class="flex flex-wrap gap-3 justify-center items-center w-full xl:w-auto bg-slate-50 p-3 rounded-xl border border-slate-200">
                
                <!-- 課程選擇 -->
                <div class="flex items-center gap-2">
                    <span class="text-slate-400"><i class="fas fa-book-open"></i></span>
                    <select id="lessonSelect" onchange="handleLessonChange()" 
                            class="bg-white border border-slate-300 text-slate-700 text-base rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 outline-none font-bold">
                        <option value="">-- 自訂題目 --</option>
                    </select>
                </div>

                <!-- 難度選擇 -->
                <div class="flex items-center gap-2">
                    <span class="text-slate-600 font-bold flex items-center gap-1 text-sm md:text-base hidden sm:flex">
                        <i class="fas fa-layer-group text-slate-400"></i>
                        <span data-i18n="selectDifficulty">選擇難度</span>
                    </span>
                    <select id="difficultySelect" onchange="handleDifficultyChange()" 
                            class="bg-white border border-slate-300 text-slate-700 text-base rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 outline-none font-bold">
                        <option value="easy" data-i18n="diffEasy">簡單 (1字)</option>
                        <option value="normal" selected data-i18n="diffNormal">一般 (3字)</option>
                        <option value="hard" data-i18n="diffHard">困難 (無提示)</option>
                        <option value="master" data-i18n="diffMaster">大師 (5字)</option>
                    </select>
                </div>

                <!-- 工具按鈕 -->
                <div class="flex items-center gap-2">
                    <!-- 編輯自訂題目按鈕 -->
                    <button onclick="openCustomPuzzleModal()" aria-label="編輯自訂題目" class="text-emerald-500 hover:text-emerald-700 bg-emerald-100 hover:bg-emerald-200 w-9 h-9 rounded-lg flex items-center justify-center transition" data-i18n-title="editPuzzle" title="編輯自訂題目">
                        <i class="fas fa-pen-to-square"></i>
                    </button>
                    <!-- 產生課程連結按鈕 -->
                    <button onclick="copyLessonLink()" aria-label="複製課程連結" class="text-blue-500 hover:text-blue-700 bg-blue-100 hover:bg-blue-200 w-9 h-9 rounded-lg flex items-center justify-center transition" data-i18n-title="copyLinkTitle" title="複製課程連結">
                        <i class="fas fa-link"></i>
                    </button>
                </div>
                
                <!-- 顯示玩家名字 (可修改) -->
                <div class="bg-blue-100 px-3 py-2 rounded-lg text-blue-700 font-bold flex items-center gap-2 cursor-pointer hover:bg-blue-200 transition-colors z-20 mt-2 md:mt-0" onclick="openEditModal()" data-i18n-title="editNameTitle" title="點擊修改名字">
                    <i class="fas fa-user-circle"></i> <span id="displayPlayerName" class="max-w-[80px] sm:max-w-[120px] truncate">玩家</span> <i class="fas fa-pen text-xs opacity-50"></i>
                </div>
            </div>

            <!-- 右側：操作區 -->

        const SoundManager = {
            ctx: null, isMuted: false,
            init: function() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playTone: function(freq, type, duration, startTime = 0) {
                if (this.isMuted) return;
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime + startTime);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime + startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + startTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(this.ctx.currentTime + startTime);
                osc.stop(this.ctx.currentTime + startTime + duration);
            },
            playClick: function() { this.playTone(600, 'sine', 0.1); },
            playError: function() { this.playTone(150, 'sawtooth', 0.1); this.playTone(100, 'sawtooth', 0.1, 0.05); },
            playCorrect: function() { this.playTone(800, 'sine', 0.1); this.playTone(1200, 'sine', 0.2, 0.1); },

            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {

        function handleLessonChange() {
            const selectedLesson = lessonSelect.value;
            let sourceText = "";
            if (selectedLesson && lessons[selectedLesson]) {
                sourceText = lessons[selectedLesson];
            } else {
                sourceText = customLessonText;

        function showToast(msg) {
            toast.querySelector('span').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function initGame(options = {}) {
            const { nextBatch = false } = options;
            SoundManager.init();
            loadVoices();

            const selectedLesson = lessonSelect.value;
            let sourceText = selectedLesson && lessons[selectedLesson] ? lessons[selectedLesson] : customLessonText;

            // 判斷當前難易度對應的字數
            let chunkSize = 3;
            const diff = document.getElementById('difficultySelect').value;
            if (diff === 'easy') chunkSize = 1;
            if (diff === 'normal') chunkSize = 3;
            if (diff === 'hard') chunkSize = 3;
            if (diff === 'master') chunkSize = 5;

            if (!nextBatch) {
                remainingChars = sourceText.split('');
                shuffleArray(remainingChars);
                startTimer();
            } else if (remainingChars.length === 0) {
                remainingChars = sourceText.split('');
                shuffleArray(remainingChars);
            }
            
            const chunk = remainingChars.splice(0, chunkSize);
            let text = chunk.join('');

            updateNextBtnText();

            poolEl.innerHTML = '';
            targetsEl.innerHTML = '';
            successMsg.classList.add('hidden');
            successMsg.innerHTML = '';
            pieces = [];
            selectedPiece = null;

            const chars = text.split('');
            chars.forEach((char, index) => createGrid(char, index));
            chars.forEach((char, charIndex) => {
                for (let pos = 0; pos < 4; pos++) {
                    createPiece(char, charIndex, pos);
                }
            });

            shuffleArray(pieces);
            pieces.forEach(p => poolEl.appendChild(p));
        }

            stopTimer();

        }

        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        }

        function updateTimerDisplay() {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            const timeString = `${m}:${s}`;
            timerEl.textContent = timeString;
            return timeString;
        }

        function createGrid(char, charIndex) {

            grid.className = 'tian-grid';
            grid.id = `grid-${charIndex}`;
            grid.dataset.char = char;

            const displayC = getDisplayChar(char);

            const hintDiv = document.createElement('div');
            hintDiv.className = 'grid-hint-text font-kai';
            hintDiv.textContent = displayC;
            grid.appendChild(hintDiv);

            for (let i = 0; i < 4; i++) {
                const zone = document.createElement('div');
                zone.className = 'drop-zone';
                zone.dataset.charIndex = charIndex;
                zone.dataset.pos = i;
                zone.addEventListener('dragover', handleDragOver);
                zone.addEventListener('dragleave', handleDragLeave);
                zone.addEventListener('drop', handleDrop);
                zone.addEventListener('click', handleZoneClick);
                grid.appendChild(zone);
            }

            const infoCard = document.createElement('div');
            infoCard.className = 'char-info-card';
            infoCard.id = `info-${charIndex}`;
            const data = charDatabase[char];
            if (data) {
                const wordsHtml = data.words ? data.words.map(w => `<span class="bg-blue-50 text-blue-700 text-xs px-2 py-1 rounded-md border border-blue-100 font-bold">${w}</span>`).join('') : '';
                
                let polyHtml = '';

                    polyHtml = `<div class="mt-1 text-xs text-slate-500 border-t border-slate-100 pt-1 flex justify-center gap-1 items-center">

                infoCard.innerHTML = `

                    <div class="flex justify-center items-baseline gap-2 text-sm border-b border-gray-100 pb-2 mb-2">

        function createPiece(char, charIndex, pos) {
            const piece = document.createElement('div');
            piece.className = `puzzle-piece pos-${pos}`;
            piece.draggable = true;
            piece.dataset.char = char;
            piece.dataset.correctIndex = charIndex;
            piece.dataset.correctPos = pos;
            piece.id = `p-${charIndex}-${pos}`;

            const displayC = getDisplayChar(char);

            const span = document.createElement('div');
            span.className = 'puzzle-text font-kai';
            span.textContent = displayC;
            piece.appendChild(span);

            piece.addEventListener('dragstart', handleDragStart);
            piece.addEventListener('dragend', handleDragEnd);
            piece.addEventListener('click', handlePieceClick);

            pieces.push(piece);
        }

        function handleDragStart(e) {
            SoundManager.init();
            draggedPiece = this;
            this.style.opacity = '0.6';
            this.style.transform = 'scale(1.05)';
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.id);
            if (selectedPiece) { selectedPiece.classList.remove('selected'); selectedPiece = null; }
        }

        function handleDragEnd(e) {
            this.style.opacity = '1';
            this.style.transform = '';
            draggedPiece = null;
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('highlight'));
        }

        function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; this.classList.add('highlight'); }
        function handleDragLeave(e) { this.classList.remove('highlight'); }
        function handleDrop(e) { e.preventDefault(); this.classList.remove('highlight'); if (draggedPiece) placePiece(draggedPiece, this); }

        function handlePieceClick(e) {
            SoundManager.init();
            e.stopPropagation();
            if (selectedPiece === this) {
                this.classList.remove('selected'); selectedPiece = null;
            } else {
                if (selectedPiece) selectedPiece.classList.remove('selected');
                this.classList.add('selected'); selectedPiece = this;
                SoundManager.playTone(400, 'sine', 0.05);
            }
        }

        function handleZoneClick(e) {
            if (selectedPiece) {
                placePiece(selectedPiece, this); 
                selectedPiece.classList.remove('selected'); 
                selectedPiece = null;
            } else {
                const pieceInside = Array.from(this.children).find(c => c.classList.contains('puzzle-piece'));
                if (pieceInside) handlePieceClick.call(pieceInside, e);
            }
        }

        function placePiece(piece, zone) {
            const existingPiece = Array.from(zone.children).find(c => c.classList.contains('puzzle-piece'));
            if (existingPiece) poolEl.appendChild(existingPiece);
            zone.appendChild(piece);
            piece.animate([{ transform: 'scale(0.9)' }, { transform: 'scale(1)' }], { duration: 200, easing: 'cubic-bezier(0.175, 0.885, 0.32, 1.275)' });
            SoundManager.playClick();
            checkProgress();
        }

        poolEl.addEventListener('click', (e) => {
            if (selectedPiece && (e.target === poolEl || e.target.classList.contains('tray-container'))) {
                poolEl.appendChild(selectedPiece);
                selectedPiece.classList.remove('selected'); selectedPiece = null;
                SoundManager.playClick();
                checkProgress();
            }
        });

        function checkProgress() {
            let totalCorrect = 0;
            let totalPieces = pieces.length;
            let isErrorFound = false;

            document.querySelectorAll('.tian-grid').forEach((grid) => {
                const zones = grid.querySelectorAll('.drop-zone');
                let gridCorrectCount = 0;
                zones.forEach(zone => {
                    zone.classList.remove('error-zone');
                    const piece = Array.from(zone.children).find(c => c.classList.contains('puzzle-piece'));
                    if (!piece) return;
                    if (piece.dataset.correctIndex === zone.dataset.charIndex && piece.dataset.correctPos === zone.dataset.pos) {
                        gridCorrectCount++; totalCorrect++;
                    } else {
                        zone.classList.add('error-zone'); isErrorFound = true;
                    }
                });
                const charIndex = zones[0].dataset.charIndex;
                const infoCard = document.getElementById(`info-${charIndex}`);
                if (gridCorrectCount === 4) {
                    if (!grid.classList.contains('completed-grid')) {
                        grid.classList.add('completed-grid');
                        SoundManager.playCorrect();
                        
                        const char = grid.dataset.char;
                        const data = charDatabase[char];
                        let textToRead = char;
                        
                        if (data) {
                            const strokeWord = currentLang === 'zh-CN' ? '画' : '畫';
                            textToRead += `。${data.rad}部，${data.str}${strokeWord}。`;
                            
                            if (data.words && data.words.length > 0) {
                                textToRead += data.words.join("，");
                            }
                        }
                        
                        setTimeout(() => speakText(textToRead), 200);
                        if (infoCard) infoCard.classList.add('show');
                    }
                } else {
                    grid.classList.remove('completed-grid');
                    if (infoCard) infoCard.classList.remove('show');
                }
            });

            if (isErrorFound) SoundManager.playError();

            if (totalCorrect === totalPieces) {
                if (remainingChars.length > 0) {
                    SoundManager.playCorrect();
                    showToast(`${t('greatJob')}${t('nextBatch')}`);
                    setTimeout(() => initGame({ nextBatch: true }), 1500);
                } else {
                    successMsg.innerHTML = `
                        <div class="bg-gradient-to-r from-green-400 to-emerald-500 text-white p-1 rounded-3xl shadow-2xl animate-bounce">
                            <div class="bg-white text-gray-800 px-10 py-6 rounded-2xl flex flex-col items-center gap-2 border-4 border-green-200">
                                <div class="text-3xl font-extrabold text-green-600 mb-2">🎉 ${t('success')} 🎉</div>
                                <div class="text-xl font-bold text-gray-600">${t('greatJob')} <span class="text-blue-600 text-2xl">${playerName}</span>！</div>
                                <div class="text-lg bg-yellow-100 px-4 py-1 rounded-full text-yellow-700 font-bold mt-2 mb-4">
                                    <i class="fas fa-stopwatch mr-1"></i> ${t('totalTime')} ${updateTimerDisplay()}
                                </div>
                                <button onclick="printCards()" aria-label="領取生字卡" class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition active:scale-95 flex items-center gap-2 text-xl">
                                    <i class="fas fa-print"></i> ${t('printCards')}
                                </button>
                            </div>
                        </div>
                    `;
                    successMsg.classList.remove('hidden');
                    triggerConfetti();
                    stopTimer();
                    setTimeout(() => SoundManager.playWin(), 800);
                }
            } else {
                successMsg.classList.add('hidden');
            }
        }

        function speakText(textToSpeak) {
            let text = '';
            if (typeof textToSpeak === 'string' && textToSpeak) {
                text = Array.from(textToSpeak).map(c => getDisplayChar(c)).join('');
            } else {
                const grids = document.querySelectorAll('.tian-grid');
                let currentChars = [];
                grids.forEach(g => currentChars.push(g.dataset.char));
                text = currentChars.map(c => getDisplayChar(c)).join('');
            }
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                if (preferredVoice) utterance.voice = preferredVoice;
                utterance.lang = currentLang === 'zh-CN' ? 'zh-CN' : 'zh-TW';
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            }
        }

        function triggerConfetti() {
            var duration = 3000; var animationEnd = Date.now() + duration;
            var interval = setInterval(function() {
                if (Date.now() > animationEnd) return clearInterval(interval);
                confetti({ particleCount: 100, startVelocity: 30, spread: 360, ticks: 60, origin: { x: Math.random(), y: Math.random() * 0.5 }, colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'] });
            }, 400);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 初始化翻譯與解析網址 Lesson 參數
        window.addEventListener('DOMContentLoaded', () => {
            applyTranslations();
            const urlParams = new URLSearchParams(window.location.search);
            const l = urlParams.get('lesson');
            const d = urlParams.get('diff');

            if (d && ['easy', 'normal', 'hard', 'master'].includes(d)) {
                document.getElementById('difficultySelect').value = d;
                document.body.className = document.body.className.replace(/diff-\w+/g, '').trim();
                document.body.classList.add(`diff-${d}`);
            }

            if (l && lessons[l]) {
                lessonSelect.value = l;
                handleLessonChange();
            }
        });

    </script>
</body>
</html>
